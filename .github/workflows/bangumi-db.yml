name: Bangumi DB Update

on:
  schedule:
    - cron: '0 2 * * 0'  # Every Sunday at 02:00 UTC
  workflow_dispatch:

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  DB_TAG: bangumi-db-latest

jobs:
  build-db:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-scraper-${{ hashFiles('**/Cargo.lock') }}

      - name: Build with scraper feature
        run: cargo build --release --features scraper

      - name: Build SQLite database from Bangumi Archive
        run: |
          echo "Building SQLite database from Bangumi Archive..."
          cargo run --release --features scraper -- build-db --output /tmp/bangumi.db --verbose

      - name: Upload as Release asset
        run: |
          # Check if release exists, create if not
          if ! gh release view "${DB_TAG}" > /dev/null 2>&1; then
            gh release create "${DB_TAG}" \
              --title "Bangumi SQLite Database (Auto-updated)" \
              --notes "Auto-generated SQLite database from Bangumi Archive.

          This database is automatically updated weekly and contains:
          - All anime subjects (type=2) from Bangumi Archive
          - Episode data
          - Indexed by name, name_cn, and date for fast lookups

          **Usage**: Download \`bangumi.db\` and use with \`--bangumi-cache\` flag.

          Last updated: $(date -u '+%Y-%m-%d %H:%M UTC')" \
              --prerelease
          fi

          # Upload/overwrite the DB file
          gh release upload "${DB_TAG}" /tmp/bangumi.db --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
