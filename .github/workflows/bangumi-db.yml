name: Bangumi DB Update

on:
  schedule:
    - cron: '0 2 * * 0'  # Every Sunday at 02:00 UTC
  workflow_dispatch:

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  DB_TAG: bangumi-db-latest

jobs:
  build-db:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-scraper-${{ hashFiles('**/Cargo.lock') }}

      - name: Build with scraper feature
        run: cargo build --release --features scraper

      - name: Download Bangumi Archive dump
        run: |
          echo "Downloading latest Bangumi Archive..."
          mkdir -p /tmp/bangumi-dump

          # Download subject dump (type=2 anime only needed)
          curl -L -o /tmp/bangumi-dump/subject.jsonlines.gz \
            "https://github.com/bangumi/Archive/releases/latest/download/subject.jsonlines.gz" || \
          curl -L -o /tmp/bangumi-dump/subject.jsonlines.gz \
            "https://raw.githubusercontent.com/bangumi/archive/master/data/subject.jsonlines.gz"

          # Download episode dump
          curl -L -o /tmp/bangumi-dump/episode.jsonlines.gz \
            "https://github.com/bangumi/Archive/releases/latest/download/episode.jsonlines.gz" || true

          # Decompress
          cd /tmp/bangumi-dump
          gunzip -f *.gz 2>/dev/null || true
          ls -la

      - name: Build SQLite database
        run: |
          echo "Building SQLite database from Bangumi dump..."

          python3 << 'SCRIPT'
          import json
          import sqlite3
          import os

          DB_PATH = "/tmp/bangumi.db"
          DUMP_DIR = "/tmp/bangumi-dump"

          # Create database
          conn = sqlite3.connect(DB_PATH)
          cur = conn.cursor()

          # Create schema
          cur.executescript("""
          CREATE TABLE IF NOT EXISTS subjects (
            id INTEGER PRIMARY KEY,
            name TEXT NOT NULL,
            name_cn TEXT,
            summary TEXT,
            date TEXT,
            score REAL,
            platform INTEGER,
            infobox TEXT
          );

          CREATE TABLE IF NOT EXISTS episodes (
            id INTEGER PRIMARY KEY,
            subject_id INTEGER REFERENCES subjects(id),
            episode_number INTEGER,
            title TEXT,
            air_date TEXT
          );

          CREATE TABLE IF NOT EXISTS tags (
            subject_id INTEGER REFERENCES subjects(id),
            tag_name TEXT,
            count INTEGER
          );

          CREATE INDEX IF NOT EXISTS idx_subjects_name ON subjects(name);
          CREATE INDEX IF NOT EXISTS idx_subjects_name_cn ON subjects(name_cn);
          CREATE INDEX IF NOT EXISTS idx_subjects_date ON subjects(date);
          CREATE INDEX IF NOT EXISTS idx_episodes_subject ON episodes(subject_id);
          """)

          # Load subjects (type=2 only = anime)
          subject_file = os.path.join(DUMP_DIR, "subject.jsonlines")
          if os.path.exists(subject_file):
              count = 0
              with open(subject_file, "r", encoding="utf-8") as f:
                  for line in f:
                      line = line.strip()
                      if not line:
                          continue
                      try:
                          obj = json.loads(line)
                      except json.JSONDecodeError:
                          continue

                      if obj.get("type") != 2:
                          continue

                      cur.execute(
                          "INSERT OR REPLACE INTO subjects (id, name, name_cn, summary, date, score, platform, infobox) VALUES (?, ?, ?, ?, ?, ?, ?, ?)",
                          (
                              obj.get("id"),
                              obj.get("name", ""),
                              obj.get("name_cn", ""),
                              obj.get("summary", ""),
                              obj.get("date", ""),
                              obj.get("score", 0.0),
                              obj.get("platform", 0),
                              obj.get("infobox", ""),
                          ),
                      )
                      count += 1
                      if count % 10000 == 0:
                          print(f"  Loaded {count} subjects...")

              print(f"Total subjects loaded: {count}")

          # Load episodes
          episode_file = os.path.join(DUMP_DIR, "episode.jsonlines")
          if os.path.exists(episode_file):
              count = 0
              with open(episode_file, "r", encoding="utf-8") as f:
                  for line in f:
                      line = line.strip()
                      if not line:
                          continue
                      try:
                          obj = json.loads(line)
                      except json.JSONDecodeError:
                          continue

                      cur.execute(
                          "INSERT OR REPLACE INTO episodes (id, subject_id, episode_number, title, air_date) VALUES (?, ?, ?, ?, ?)",
                          (
                              obj.get("id"),
                              obj.get("subject_id"),
                              obj.get("sort", obj.get("ep", 0)),
                              obj.get("name", ""),
                              obj.get("airdate", ""),
                          ),
                      )
                      count += 1
                      if count % 50000 == 0:
                          print(f"  Loaded {count} episodes...")

              print(f"Total episodes loaded: {count}")

          conn.commit()

          # Print stats
          cur.execute("SELECT COUNT(*) FROM subjects")
          print(f"Subjects in DB: {cur.fetchone()[0]}")
          cur.execute("SELECT COUNT(*) FROM episodes")
          print(f"Episodes in DB: {cur.fetchone()[0]}")

          conn.close()

          # Print file size
          size_mb = os.path.getsize(DB_PATH) / (1024 * 1024)
          print(f"Database size: {size_mb:.1f} MB")
          SCRIPT

      - name: Upload as Release asset
        run: |
          # Check if release exists, create if not
          if ! gh release view "${DB_TAG}" > /dev/null 2>&1; then
            gh release create "${DB_TAG}" \
              --title "Bangumi SQLite Database (Auto-updated)" \
              --notes "Auto-generated SQLite database from Bangumi Archive.

          This database is automatically updated weekly and contains:
          - All anime subjects (type=2) from Bangumi Archive
          - Episode data
          - Indexed by name, name_cn, and date for fast lookups

          **Usage**: Download \`bangumi.db\` and use with \`--bangumi-cache\` flag.

          Last updated: $(date -u '+%Y-%m-%d %H:%M UTC')" \
              --prerelease
          fi

          # Upload/overwrite the DB file
          gh release upload "${DB_TAG}" /tmp/bangumi.db --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
