name: Main Build

on:
  push:
    branches:
      - master
      - main
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  meta:
    name: Compute branch build version
    runs-on: ubuntu-latest
    outputs:
      branch_name: ${{ steps.meta.outputs.branch_name }}
      build_version: ${{ steps.meta.outputs.build_version }}
      release_name: ${{ steps.meta.outputs.release_name }}
      release_tag: ${{ steps.meta.outputs.release_tag }}
    steps:
      - uses: actions/checkout@v4

      - id: meta
        shell: bash
        run: |
          base_version=$(sed -n 's/^version = "\(.*\)"/\1/p' Cargo.toml | head -n 1)
          branch_name="${GITHUB_REF_NAME}"
          build_version="${base_version}-${branch_name}.${GITHUB_RUN_NUMBER}"
          echo "branch_name=${branch_name}" >> "$GITHUB_OUTPUT"
          echo "build_version=${build_version}" >> "$GITHUB_OUTPUT"
          echo "release_name=Main Build ${build_version}" >> "$GITHUB_OUTPUT"
          echo "release_tag=${branch_name}-v${build_version}" >> "$GITHUB_OUTPUT"

  build:
    needs: meta
    name: Branch build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            archive: tar.gz
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            archive: zip
          - target: aarch64-pc-windows-msvc
            os: windows-latest
            archive: zip
          - target: x86_64-apple-darwin
            os: macos-latest
            archive: tar.gz
          - target: aarch64-apple-darwin
            os: macos-latest
            archive: tar.gz

    env:
      BUILD_VERSION: ${{ needs.meta.outputs.build_version }}
      ARCHIVE_NAME: aniorg-${{ needs.meta.outputs.build_version }}-${{ matrix.target }}

    steps:
      - uses: actions/checkout@v4

      - name: Apply branch build version
        shell: pwsh
        run: |
          $path = 'Cargo.toml'
          $content = Get-Content $path -Raw
          $updated = [regex]::Replace($content, '(?m)^version = ".*"$', "version = `"$env:BUILD_VERSION`"", 1)
          $utf8NoBom = New-Object System.Text.UTF8Encoding($false)
          [System.IO.File]::WriteAllText((Resolve-Path $path), $updated, $utf8NoBom)

      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          if [ "${{ matrix.target }}" = "x86_64-unknown-linux-musl" ]; then
            sudo apt-get install -y musl-tools
          elif [ "${{ matrix.target }}" = "aarch64-unknown-linux-gnu" ]; then
            sudo apt-get install -y gcc-aarch64-linux-gnu
          fi
          sudo apt-get install -y protobuf-compiler

      - name: Install protoc (macOS)
        if: matrix.os == 'macos-latest'
        run: brew install protobuf

      - name: Install protoc (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          Invoke-WebRequest -Uri https://github.com/protocolbuffers/protobuf/releases/download/v25.1/protoc-25.1-win64.zip -OutFile protoc.zip
          Expand-Archive -Path protoc.zip -DestinationPath "$env:TEMP\protoc" -Force
          Move-Item -Path "$env:TEMP\protoc\bin\protoc.exe" -Destination "$env:TEMP\protoc\" -Force
          Remove-Item -Path "$env:TEMP\protoc\bin" -Recurse -Force
          Add-Content -Path $env:GITHUB_PATH -Value "$env:TEMP\protoc"
        shell: powershell

      - name: Build release binary
        run: cargo build --release --features "scraper clouddrive" --target ${{ matrix.target }}
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc

      - name: Prepare archive (Unix)
        if: matrix.os != 'windows-latest'
        run: |
          cd target/${{ matrix.target }}/release
          strip aniorg || true
          tar czvf ../../../${{ env.ARCHIVE_NAME }}.tar.gz aniorg
          cd ../../..

      - name: Prepare archive (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          cd target/${{ matrix.target }}/release
          7z a ../../../${{ env.ARCHIVE_NAME }}.zip aniorg.exe
          cd ../../..

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARCHIVE_NAME }}
          path: ${{ env.ARCHIVE_NAME }}.${{ matrix.archive }}

  release:
    name: Publish branch release
    needs:
      - meta
      - build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create or update branch release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ needs.meta.outputs.release_tag }}
          name: ${{ needs.meta.outputs.release_name }}
          prerelease: true
          draft: false
          generate_release_notes: false
          files: artifacts/**/*
          body: |
            Branch build version: ${{ needs.meta.outputs.build_version }}
            Branch: ${{ needs.meta.outputs.branch_name }}
            Commit: ${{ github.sha }}
            Run: ${{ github.run_id }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
