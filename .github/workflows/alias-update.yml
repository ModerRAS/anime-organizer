name: Alias Update - Scrape & Match

on:
  schedule:
    - cron: '0 16 * * 1'  # Every Monday 16:00 UTC
  workflow_dispatch:
    inputs:
      days:
        description: 'Number of days to look back for new anime'
        required: false
        default: '7'
        type: string

permissions:
  contents: write
  issues: write
  pull-requests: write

env:
  CARGO_TERM_COLOR: always

jobs:
  scrape-and-match:
    runs-on: ubuntu-latest
    outputs:
      confident_count: ${{ steps.match.outputs.confident_count }}
      uncertain_count: ${{ steps.match.outputs.uncertain_count }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-scraper-${{ hashFiles('**/Cargo.lock') }}

      - name: Build with scraper and llm-api features
        run: cargo build --release --features "scraper,llm-api"

      - name: Download Bangumi DB from release
        continue-on-error: true
        run: |
          gh release download bangumi-db-latest \
            --pattern 'bangumi.db' \
            --dir /tmp/bangumi-cache || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run scraper
        id: scrape
        run: |
          DAYS="${{ github.event.inputs.days || '7' }}"
          echo "Scraping anime from last ${DAYS} days..."
          # Output scraped data as JSON for the matcher
          cargo run --release --features "scraper,llm-api" -- scrape \
            --days "${DAYS}" \
            --format json > /tmp/scraped.json 2>/dev/null || echo "[]" > /tmp/scraped.json
          echo "scraped_file=/tmp/scraped.json" >> "$GITHUB_OUTPUT"
        env:
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}

      - name: Run LLM matcher
        id: match
        continue-on-error: true
        run: |
          # Use the scraper's match command which uses LLM to find new aliases
          cargo run --release --features "scraper,llm-api" -- match \
            --input /tmp/scraped.json \
            --aliases data/aliases.json \
            --format github > /tmp/match_result.txt 2>/dev/null || true

          # Parse output for GitHub Actions
          CONFIDENT=$(grep -oP 'confident_count=\K\d+' /tmp/match_result.txt 2>/dev/null || echo "0")
          UNCERTAIN=$(grep -oP 'uncertain_count=\K\d+' /tmp/match_result.txt 2>/dev/null || echo "0")

          echo "confident_count=${CONFIDENT}" >> "$GITHUB_OUTPUT"
          echo "uncertain_count=${UNCERTAIN}" >> "$GITHUB_OUTPUT"
        env:
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          LLM_BASE_URL: ${{ secrets.LLM_BASE_URL }}
          LLM_MODEL: claude-sonnet-4-20250514

      - name: Update aliases.json with confident matches
        if: steps.match.outputs.confident_count != '0'
        run: |
          # Extract confident proposals and merge into aliases.json
          grep 'confident_proposals=' /tmp/match_result.txt | \
            sed 's/confident_proposals=//' > /tmp/confident.json || true

          if [ -s /tmp/confident.json ]; then
            # Use jq to merge new aliases (if available, otherwise Python)
            python3 -c "
          import json, sys

          with open('data/aliases.json', 'r', encoding='utf-8') as f:
              aliases = json.load(f)

          with open('/tmp/confident.json', 'r', encoding='utf-8') as f:
              proposals = json.load(f)

          for p in proposals:
              key = p.get('fan_translation', '')
              if key and key not in aliases:
                  aliases[key] = {
                      'bangumi_id': p['alias_entry']['bangumi_id'],
                      'name': p['alias_entry']['name'],
                      'tmdb_id': p['alias_entry'].get('tmdb_id'),
                      'anidb_id': p['alias_entry'].get('anidb_id')
                  }

          with open('data/aliases.json', 'w', encoding='utf-8') as f:
              json.dump(aliases, f, ensure_ascii=False, indent=2)
          "
          fi

      - name: Create PR for confident matches
        if: steps.match.outputs.confident_count != '0'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          BRANCH="alias-update-$(date +%Y%m%d)"
          git checkout -b "${BRANCH}"
          git add data/aliases.json
          git commit -m "feat(aliases): add ${{ steps.match.outputs.confident_count }} new alias entries

          Auto-generated by LLM alias matching.
          Matched with high confidence from recent anime data."

          git push origin "${BRANCH}"

          gh pr create \
            --title "feat(aliases): add new alias entries (auto)" \
            --body "## Auto-generated Alias Update

          This PR was auto-generated by the alias update workflow.

          **Confident matches**: ${{ steps.match.outputs.confident_count }}

          Please review the changes to \`data/aliases.json\`." \
            --label "alias-update" \
            --base master
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create issues for uncertain matches
        if: steps.match.outputs.uncertain_count != '0'
        run: |
          grep 'uncertain_proposals=' /tmp/match_result.txt | \
            sed 's/uncertain_proposals=//' > /tmp/uncertain.json || true

          if [ -s /tmp/uncertain.json ]; then
            python3 -c "
          import json, subprocess, sys

          with open('/tmp/uncertain.json', 'r', encoding='utf-8') as f:
              proposals = json.load(f)

          for p in proposals:
              fan = p.get('fan_translation', 'Unknown')
              entry = p.get('alias_entry', {})
              bgm_id = entry.get('bangumi_id', 0)
              name = entry.get('name', '')
              confidence = p.get('confidence', 'low')
              reasoning = p.get('reasoning', '')

              body = f'''## Anime Information

          | Field | Value |
          |-------|-------|
          | **Bangumi ID** | {bgm_id} |
          | **Bangumi Name** | {name} |
          | **Fan Translation** | {fan} |

          ## LLM Analysis

          **Confidence**: {confidence}
          **Reasoning**: {reasoning}

          ## Proposed Alias Entry

          \`\`\`json
          {{\"{fan}\": {{\"bangumi_id\": {bgm_id}, \"name\": \"{name}\", \"tmdb_id\": null, \"anidb_id\": null}}}}
          \`\`\`

          ## User Action Required

          Reply with:
          - \`confirm\` - approve as-is
          - \`correct: {{...}}\` - provide correction
          - \`reject\` - discard
          '''

              title = f'[Alias Request] {fan} → {name} (bgm:{bgm_id})'
              subprocess.run([
                  'gh', 'issue', 'create',
                  '--title', title,
                  '--body', body,
                  '--label', 'alias-request'
              ], check=False)
          "
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
