name: Alias Update - Scrape & Match

on:
  schedule:
    - cron: '0 16 * * 1'  # Every Monday 16:00 UTC
  workflow_dispatch:
    inputs:
      days:
        description: 'Number of days to look back for new anime'
        required: false
        default: '7'
        type: string

permissions:
  contents: write
  issues: write
  pull-requests: write

env:
  CARGO_TERM_COLOR: always

jobs:
  scrape-and-match:
    runs-on: ubuntu-latest
    outputs:
      confident_count: ${{ steps.match.outputs.confident_count }}
      uncertain_count: ${{ steps.match.outputs.uncertain_count }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-scraper-${{ hashFiles('**/Cargo.lock') }}

      - name: Build with scraper and llm-api features
        run: |
          echo "::group::Building scraper binary"
          echo "Building anime-organizer with scraper and llm-api features..."
          cargo build --release --features "scraper,llm-api"
          echo "::notice::Build completed successfully"
          echo "::endgroup::"

      - name: Download Bangumi DB from release
        continue-on-error: true
        run: |
          gh release download bangumi-db-latest \
            --pattern 'bangumi.db' \
            --dir /tmp/bangumi-cache || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run scraper
        id: scrape
        run: |
          DAYS="${{ github.event.inputs.days || '7' }}"
          echo "::group::Running scraper"
          echo "::notice::Scraping anime from last ${DAYS} days..."
          # Output scraped data as JSON for the matcher
          if cargo run --release --features "scraper,llm-api" -- scrape \
            --days "${DAYS}" \
            --format json > /tmp/scraped.json; then
            echo "::notice::Scraping completed successfully"
          else
            echo "::warning::Scraping failed, using empty result"
            echo "[]" > /tmp/scraped.json
          fi
          echo "scraped_file=/tmp/scraped.json" >> "$GITHUB_OUTPUT"
          echo "::endgroup::"
        env:
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}

      - name: Extract infobox aliases from Bangumi dump
        run: |
          echo "::group::Extracting infobox aliases"
          echo "::notice::Extracting aliases from Bangumi dump..."
          # Extract aliases from Bangumi dump - these are official aliases from infobox
          if cargo run --release --features "scraper" -- extract-aliases \
            --download \
            --output /tmp/extracted_aliases.json; then
            echo "::notice::Extraction completed successfully"
          else
            echo "::warning::Extraction failed"
            echo "{}" > /tmp/extracted_aliases.json
          fi

          # Merge extracted aliases into aliases.json
          if [ -s /tmp/extracted_aliases.json ]; then
            echo "::notice::Merging extracted aliases into aliases.json..."
            python3 scripts/merge_aliases.py
            echo "::notice::Infobox aliases merged successfully"
          else
            echo "::warning::No extracted aliases to merge"
          fi
          echo "::endgroup::"

      - name: Run LLM matcher
        id: match
        continue-on-error: true
        run: |
          echo "::group::Running LLM matcher"
          echo "::notice::Starting LLM-based alias matching..."
          # Use the scraper's match command which uses LLM to find new aliases
          if cargo run --release --features "scraper,llm-api" -- match \
            --input /tmp/scraped.json \
            --aliases data/aliases.json \
            --format github > /tmp/match_result.txt; then
            echo "::notice::Matching completed successfully"
          else
            echo "::warning::Matching command failed, processing partial results"
            touch /tmp/match_result.txt
          fi

          # Parse output for GitHub Actions
          echo "::notice::Parsing match results..."
          CONFIDENT=$(grep -oP 'confident_count=\K\d+' /tmp/match_result.txt || echo "0")
          UNCERTAIN=$(grep -oP 'uncertain_count=\K\d+' /tmp/match_result.txt || echo "0")

          echo "::notice::Confident matches: ${CONFIDENT}"
          echo "::notice::Uncertain matches: ${UNCERTAIN}"
          echo "confident_count=${CONFIDENT}" >> "$GITHUB_OUTPUT"
          echo "uncertain_count=${UNCERTAIN}" >> "$GITHUB_OUTPUT"
          echo "::endgroup::"
        env:
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          LLM_BASE_URL: ${{ secrets.LLM_BASE_URL }}
          LLM_MODEL: MiniMax-M2.7

      - name: Update aliases.json with confident matches
        if: steps.match.outputs.confident_count != '0'
        run: |
          echo "::group::Updating aliases.json"
          echo "::notice::Extracting confident proposals from match results..."
          # Extract confident proposals and merge into aliases.json
          grep 'confident_proposals=' /tmp/match_result.txt | \
            sed 's/confident_proposals=//' > /tmp/confident.json || true

          if [ -s /tmp/confident.json ]; then
            echo "::notice::Merging $(wc -l < /tmp/confident.json) confident proposals into aliases.json..."
            python3 scripts/update_aliases.py
            echo "::notice::aliases.json updated successfully"
          else
            echo "::warning::No confident proposals found to merge"
          fi
          echo "::endgroup::"

      - name: Create PR for confident matches
        if: steps.match.outputs.confident_count != '0'
        run: |
          echo "::group::Creating Pull Request"
          echo "::notice::Configuring git user for PR creation..."
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          BRANCH="alias-update-$(date +%Y%m%d)"
          echo "::notice::Creating branch: ${BRANCH}"
          git checkout -b "${BRANCH}"
          git add data/aliases.json
          echo "::notice::Committing ${{ steps.match.outputs.confident_count }} alias entries..."
          git commit -m "feat(aliases): add ${{ steps.match.outputs.confident_count }} new alias entries"

          echo "::notice::Pushing branch to origin..."
          git push origin "${BRANCH}"

          echo "::notice::Creating pull request..."
          gh pr create \
            --title "feat(aliases): add new alias entries (auto)" \
            --body "## Auto-generated Alias Update\n\nThis PR was auto-generated by the alias update workflow.\n\n**Confident matches**: ${{ steps.match.outputs.confident_count }}\n\nPlease review the changes to data/aliases.json." \
            --label "alias-update" \
            --base master
          echo "::notice::Pull request created successfully"
          echo "::endgroup::"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create issues for uncertain matches
        if: steps.match.outputs.uncertain_count != '0'
        run: |
          echo "::group::Creating issues for uncertain matches"
          echo "::notice::Extracting uncertain proposals from match results..."
          grep 'uncertain_proposals=' /tmp/match_result.txt | \
            sed 's/uncertain_proposals=//' > /tmp/uncertain.json || true

          if [ -s /tmp/uncertain.json ]; then
            echo "::notice::Processing uncertain proposals and creating issues..."
            python3 scripts/create_alias_issues.py
            echo "::notice::Created issues for uncertain matches"
          else
            echo "::warning::No uncertain proposals found"
          fi
          echo "::endgroup::"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
